volumes:
  psql:

services:
  psql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: statusy
      POSTGRES_USER: statusy
      POSTGRES_PASSWORD: password # only do this in development
    volumes:
      - psql:/var/lib/postgresql # save data between restarts
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statusy -d statusy"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgmq-installer:
    build:
      context: .
      dockerfile: Dockerfile.pgmq
    depends_on:
      psql:
        condition: service_healthy
    environment:
      DB_HOST: psql
      DB_USER: statusy
      DB_PASSWORD: password
      DB_NAME: statusy

  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      psql:
        condition: service_healthy
      pgmq-installer:
        condition: service_completed_successfully
    ports:
      - 8081:8081


