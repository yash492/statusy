volumes:
  psql:
  caddy_data:
  caddy_config:

services:
  psql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: statusy
      POSTGRES_USER: statusy
      POSTGRES_PASSWORD: password # only do this in development
    volumes:
      - psql:/var/lib/postgresql # save data between restarts
    ports:
      - 5432:5432

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - psql
    ports:
      - 8081:8081

  frontend:
    build:
      context: ./_ui
      dockerfile: Dockerfile
      args:
        PUBLIC_API_SERVER_ROUTE: http://localhost:8081/api
    depends_on:
      - backend
    ports:
      - 3000:3000

  caddy:
    image: caddy:2.11.3-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:433"
      - "443:443/udp"
    volumes:
      - .caddy/Caddyfile:/etc/caddy/Caddyfile
      - .caddy/site:/srv
      - .caddy/caddy_data:/data
      - .caddy/caddy_config:/config
