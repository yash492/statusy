components:
  schemas:
    AddViewServiceRequest:
      type: object
      required:
        - service_id
        - include_all_components
        - monitor_incidents
        - monitor_scheduled_maintenances
      properties:
        service_id:
          type: integer
          description: The ID of the service to add to the view
        include_all_components:
          type: boolean
          description: Whether to include all components of the service
        monitor_incidents:
          type: boolean
          description: Whether to monitor incidents for the service
        monitor_scheduled_maintenances:
          type: boolean
          description: Whether to monitor scheduled maintenances for the service
        component_ids:
          type: array
          items:
            type: integer
          description: List of specific component IDs to include (ignored if include_all_components is true)
        component_group_ids:
          type: array
          items:
            type: integer
          description: List of specific component group IDs to include (ignored if include_all_components is true)
    Component:
      type: object
      required:
        - id
        - name
        - provider_id
      properties:
        id:
          type: integer
          description: Unique identifier for the component
        name:
          type: string
          description: Display name of the component
        provider_id:
          type: string
          description: Provider-specific identifier for the component
    ComponentGroup:
      type: object
      required:
        - id
        - name
        - provider_id
        - components
      properties:
        id:
          type: integer
          description: Unique identifier for the component group
        name:
          type: string
          description: Display name of the component group
        provider_id:
          type: string
          description: Provider-specific identifier for the component group
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
          description: List of components within this group
    EditViewRequest:
      type: object
      required:
        - name
        - description
        - is_default
      properties:
        name:
          type: string
          description: Display name of the view
        description:
          type: string
          description: Description of the view
        is_default:
          type: boolean
          description: Whether this is the default view
    EditViewServiceRequest:
      type: object
      required:
        - include_all_components
        - monitor_incidents
        - monitor_scheduled_maintenances
      properties:
        include_all_components:
          type: boolean
          description: Whether to include all components of the service
        monitor_incidents:
          type: boolean
          description: Whether to monitor incidents for the service
        monitor_scheduled_maintenances:
          type: boolean
          description: Whether to monitor scheduled maintenances for the service
        component_ids:
          type: array
          items:
            type: integer
          description: List of specific component IDs to include (ignored if include_all_components is true)
        component_group_ids:
          type: array
          items:
            type: integer
          description: List of specific component group IDs to include (ignored if include_all_components is true)
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code identifier
        message:
          type: string
          description: Human-readable error message
    Incident:
      type: object
      required:
        - id
        - title
        - status
        - incident_url
        - provider_created_at
      properties:
        id:
          type: integer
          description: Unique identifier for the incident
        title:
          type: string
          description: Title or summary of the incident
        status:
          type: string
          description: Current status of the incident (investigating, identified, monitoring, resolved)
        incident_url:
          type: string
          description: The URL of the actual status page incident
        provider_created_at:
          type: string
          format: date-time
          description: Timestamp when the incident was created by the provider
    PaginatedViewServices:
      type: object
      required:
        - services
        - total_count
        - up_count
        - down_count
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ViewServiceStatus'
        total_count:
          type: integer
        up_count:
          type: integer
        down_count:
          type: integer
    PaginationQuery:
      type: object
      properties:
        page_number:
          type: integer
          description: 'Page number for paginated results (default: 1)'
        page_size:
          type: integer
          description: 'Number of items per page (default: 20)'
    ScheduledMaintenance:
      type: object
      required:
        - id
        - title
        - status
        - scheduled_maintenance_url
        - starts_at
        - ends_at
        - provider_created_at
      properties:
        id:
          type: integer
          description: Unique identifier for the incident
        title:
          type: string
          description: Title or summary of the incident
        status:
          type: string
          description: Current status of the incident (investigating, identified, monitoring, resolved)
        scheduled_maintenance_url:
          type: string
          description: The URL of the actual scheduled maintenance event
        starts_at:
          type: string
          format: date-time
          description: The start time of the scheduled maintenance event in UTC.
        ends_at:
          type: string
          format: date-time
          description: The end time of the scheduled maintenance event in UTC
        provider_created_at:
          type: string
          format: date-time
          description: Timestamp when the incident was created by the provider
    ServiceComponents:
      type: object
      required:
        - service_id
        - service_name
        - service_slug
        - grouped_components
        - ungrouped_components
      properties:
        service_id:
          type: integer
          description: The service ID
        service_name:
          type: string
          description: The service name
        service_slug:
          type: string
          description: The service slug
        grouped_components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentGroup'
          description: List of component groups for the service
        ungrouped_components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
          description: List of ungrouped components for the service
    Statuspage:
      type: object
      required:
        - id
        - name
        - slug
        - url
      properties:
        id:
          type: integer
          description: Unique identifier for the status page
        name:
          type: string
          description: Display name of the status page
        slug:
          type: string
          description: URL-friendly slug for the status page
        url:
          type: string
          description: Root domain URL of the status page
    StatuspageIncidents:
      type: object
      required:
        - incidents
        - statuspage
        - total_count
      properties:
        incidents:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
        statuspage:
          $ref: '#/components/schemas/Statuspage'
        total_count:
          type: integer
    StatuspageScheduledMaintenances:
      type: object
      required:
        - scheduled_maintenances
        - statuspage
        - total_count
      properties:
        scheduled_maintenances:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledMaintenance'
        statuspage:
          $ref: '#/components/schemas/Statuspage'
        total_count:
          type: integer
    View:
      type: object
      required:
        - name
        - public_id
        - description
        - is_default
      properties:
        name:
          type: string
          description: Display name of the view
        public_id:
          type: string
          description: Unique public identifier (Snowflake ID) for the view
        description:
          type: string
          description: Description of the view
        is_default:
          type: boolean
          description: Whether this is the default view
    ViewServiceResponse:
      type: object
      required:
        - id
        - service_id
        - include_all_components
        - monitor_incidents
        - monitor_scheduled_maintenances
      properties:
        id:
          type: integer
          description: Unique identifier for the view-service mapping
        service_id:
          type: integer
          description: The ID of the service
        include_all_components:
          type: boolean
          description: Whether all components of this service are included
        monitor_incidents:
          type: boolean
          description: Whether to monitor incidents for the service
        monitor_scheduled_maintenances:
          type: boolean
          description: Whether to monitor scheduled maintenances for the service
        component_ids:
          type: array
          items:
            type: integer
          description: List of specific component IDs to include (ignored if include_all_components is true)
        component_group_ids:
          type: array
          items:
            type: integer
          description: List of specific component group IDs to include (ignored if include_all_components is true)
    ViewServiceStatus:
      type: object
      required:
        - id
        - name
        - slug
        - status
        - last_incident
        - include_all_components
        - monitor_incidents
        - monitor_scheduled_maintenances
        - upcoming_maintenance
        - last_incident_link
        - upcoming_maintenance_link
      properties:
        id:
          type: integer
          description: Unique identifier for the status page service
        name:
          type: string
          description: Display name of the service
        slug:
          type: string
          description: URL-friendly slug of the service
        status:
          type: string
          description: Aggregated status of the service (up or down)
        last_incident:
          type: string
          description: Active incident description (empty string if none)
        include_all_components:
          type: boolean
          description: Whether all components of this service are included in the view
        monitor_incidents:
          type: boolean
          description: Whether to monitor incidents for the service
        monitor_scheduled_maintenances:
          type: boolean
          description: Whether to monitor scheduled maintenances for the service
        upcoming_maintenance:
          type: string
          description: Upcoming scheduled maintenance description (empty string if none)
        last_incident_link:
          type: string
          description: Link to the active incident on the provider's status page (empty string if none)
        upcoming_maintenance_link:
          type: string
          description: Link to the upcoming scheduled maintenance on the provider's status page (empty string if none)
servers:
  - url: https://statusy.app
    description: A Status Page Aggregator
    variables: {}
